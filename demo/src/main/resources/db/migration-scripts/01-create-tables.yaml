databaseChangeLog:
  - changeSet:
      id: table_measurement
      author: aziolkowska
      changes:
        - createTable:
            tableName: measurement
            columns:
              - column:
                  name: sensorId
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: cityId
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: pm10
                  type: DECIMAL(12, 2)
              - column:
                  name: co
                  type: DECIMAL(12, 2)
              - column:
                  name: no2
                  type: DECIMAL(12, 2)
              - column:
                  name: measurement_timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: measurement
            columnNames: cityId, timestamp, sensorId
            constraintName: pk_measurement

